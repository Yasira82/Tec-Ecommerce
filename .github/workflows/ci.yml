name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Lint
        run: npm run lint
        continue-on-error: true

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_PI_SANDBOX:      ${{ secrets.NEXT_PUBLIC_PI_SANDBOX || 'false' }}
          NEXT_PUBLIC_API_GATEWAY_URL: ${{ secrets.NEXT_PUBLIC_API_GATEWAY_URL || 'https://api-gateway-production-6a68.up.railway.app' }}
          NEXT_PUBLIC_PI_APP_ID:       ${{ secrets.NEXT_PUBLIC_PI_APP_ID || 'test-app-id' }}
