name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  payment-policy:
    name: Drift Detection — KB claims vs code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Drift Detection — KB claims vs code
        # Each check maps to a C-doc; a violation = doc↔runtime drift.
        # ADR-009 (payment contract) · C-12 §11 (CSRF) · C-76/ADR-007 (dual-mode guard).
        run: |
          violations=0

          # ── ADR-009: unified payment contract ───────────────────────────
          if grep -rniE 'x-service-secret|SERVICE_SECRET' src; then
            echo "::error::ADR-009: use x-internal-key / INTERNAL_SECRET (not x-service-secret / SERVICE_SECRET)"
            violations=1
          fi
          if grep -rnE 'amount:[[:space:]]*z\.string' src | grep -qi payment; then
            echo "::error::ADR-009: payment amount must be a number — no z.string() for amount in payment routes"
            violations=1
          fi

          # ── C-12 §11 / P2: CSRF enforced ONLY in middleware ─────────────
          if grep -rnE 'csrfCookie !== csrfHeader|csrfCookie === csrfHeader|CSRF validation failed|CSRF token mismatch' src/app/api 2>/dev/null; then
            echo "::error::CSRF must be enforced ONLY in middleware (P2 single source of truth). Remove route-level CSRF checks — they 403 legit Pi-Browser payments."
            violations=1
          fi

          # ── C-76 / ADR-007: every Mode-2 buy handler must guard ─────────
          # Any component/page triggering createU2APayment() must check
          # isHubNavigation() first (pi-test diagnostic harness is exempt).
          handlers=$(grep -rlE 'createU2APayment\(' src/app src/components --include=*.tsx 2>/dev/null | grep -v '/pi-test/' || true)
          for f in $handlers; do
            if ! grep -qE 'isHubNavigation' "$f"; then
              echo "::error::ADR-007 (C-76): $f triggers a Mode-2 Pi payment without isHubNavigation() guard"
              violations=1
            fi
          done

          [ "$violations" -eq 0 ] && echo "Drift Detection OK — code matches KB claims" || exit 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Security audit (advisory)
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_PI_SANDBOX:      'false'
          NEXT_PUBLIC_PI_APP_ID:       ${{ secrets.NEXT_PUBLIC_PI_APP_ID || 'test-app-id' }}
          API_GATEWAY_URL:             ${{ secrets.API_GATEWAY_URL || 'https://api-gateway-production-6a68.up.railway.app' }}
          INTERNAL_SECRET:             ${{ secrets.INTERNAL_SECRET || 'ci-test-secret-minimum-32-chars!!' }}
