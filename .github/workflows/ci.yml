name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  payment-policy:
    name: Payment contract policy (ADR-009)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check payment contract
        run: |
          violations=0
          if grep -rniE 'x-service-secret|SERVICE_SECRET' src; then
            echo "::error::ADR-009: use x-internal-key / INTERNAL_SECRET (not x-service-secret / SERVICE_SECRET)"
            violations=1
          fi
          if grep -rnE 'amount:[[:space:]]*z\.string' src | grep -qi payment; then
            echo "::error::ADR-009: payment amount must be a number — no z.string() for amount in payment routes"
            violations=1
          fi
          [ "$violations" -eq 0 ] && echo "payment contract policy OK" || exit 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Test
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Update TEC packages
        run: npm install @yasser172/tec-ui@latest @yasser172/tec-auth@latest --legacy-peer-deps
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_PI_SANDBOX:      'false'
          NEXT_PUBLIC_PI_APP_ID:       ${{ secrets.NEXT_PUBLIC_PI_APP_ID || 'test-app-id' }}
          API_GATEWAY_URL:             ${{ secrets.API_GATEWAY_URL || 'https://api-gateway-production-6a68.up.railway.app' }}
          INTERNAL_SECRET:             ${{ secrets.INTERNAL_SECRET || 'ci-test-secret-minimum-32-chars!!' }}
